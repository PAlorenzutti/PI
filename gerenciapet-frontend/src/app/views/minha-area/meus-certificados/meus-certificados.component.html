<c-card class="mb-4">
  <c-card-header>
      <strong><fa-icon [icon]="faIcons.faCertificate"></fa-icon> &nbsp; Meus Certificados</strong>
  </c-card-header>
  <c-card-body>
      <div *ngIf="loading" class="d-flex justify-content-center my-5">
          <c-spinner color="primary"></c-spinner>
      </div>

      <div *ngIf="!loading && certificados.length > 0">
          <table cTable hover [responsive]="true">
              <thead cTableColor="light">
                  <tr>
                      <th scope="col" style="width: 5%; text-align: center; vertical-align: middle;">#</th>
                      <th scope="col" style="width: 35%; text-align: center; vertical-align: middle;">Código de Validação</th>
                      <th scope="col" style="width: 20%; text-align: center; vertical-align: middle;">Tipo de Certificado</th>
                      <th scope="col" style="width: 20%; text-align: center; vertical-align: middle;">Data de Emissão</th>
                      <th scope="col" style="width: 20%; text-align: center; vertical-align: middle;">Ações</th>
                  </tr>
              </thead>
              <tbody>
                  <tr *ngFor="let cert of certificados; index as i">
                      <th scope="row" style="text-align: center; vertical-align: middle;">{{ i + 1 }}</th>
                      <td style="text-align: center; vertical-align: middle; font-family: monospace;">{{ cert.codigoValidacao }}</td>
                      <td style="text-align: center; vertical-align: middle;">
                          <c-badge [color]="cert.tipo === 'HORAS_COMPLEMENTARES' ? 'success' : 'primary'">
                              {{ cert.tipo === 'HORAS_COMPLEMENTARES' ? 'Horas Complementares' : 'Horas de Extensão' }}
                          </c-badge>
                      </td>
                      <td style="text-align: center; vertical-align: middle;">{{ cert.dataEmissao | date:'dd/MM/yyyy' }}</td>
                      <td style="text-align: center; vertical-align: middle;">
                          <button cButton class="gerenciapet-btn text-white fw-bold" color="info" size="sm" 
                                  title="Baixar PDF" (click)="baixarPdf(cert)" [disabled]="gerandoId === cert.codigoValidacao">
                              <fa-icon *ngIf="gerandoId !== cert.codigoValidacao" [icon]="faIcons.faDownload" style="color: white;"></fa-icon> 
                              <c-spinner *ngIf="gerandoId === cert.codigoValidacao" size="sm" color="light"></c-spinner>
                              Baixar
                          </button>
                      </td>
                  </tr>
              </tbody>
          </table>
      </div>
      
      <div *ngIf="!loading && certificados.length === 0" class="text-center mt-4 mb-4">
          <p>Você ainda não possui certificados emitidos.</p>
      </div>
  </c-card-body>
</c-card>
